<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoTurtle – Draw with Blocks!</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/blockly/10.4.3/blockly.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/blockly/10.4.3/javascript_compressed.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --coral:   #FF6B6B;
    --yellow:  #FFD93D;
    --mint:    #6BCB77;
    --sky:     #4D96FF;
    --purple:  #C77DFF;
    --bg:      #FFF8F0;
    --panel:   #FFFFFF;
    --dark:    #2D2D2D;
    --radius:  16px;
    --shadow:  0 4px 24px rgba(0,0,0,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--dark);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 20px;
    background: var(--dark);
    box-shadow: 0 2px 12px rgba(0,0,0,0.18);
    flex-shrink: 0;
    z-index: 10;
  }

  .logo {
    font-size: 1.6rem;
    font-weight: 900;
    letter-spacing: -0.5px;
    color: var(--yellow);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo span { color: #fff; }

  .subtitle {
    font-size: 0.85rem;
    color: #aaa;
    font-weight: 600;
  }

  .header-actions {
    margin-left: auto;
    display: flex;
    gap: 10px;
  }

  .btn {
    padding: 8px 18px;
    border: none;
    border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.9rem;
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.12s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn:hover  { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,0.18); }
  .btn:active { transform: translateY(0); }

  .btn-run    { background: var(--mint);   color: #fff; }
  .btn-clear  { background: var(--coral);  color: #fff; }
  .btn-reset  { background: var(--yellow); color: var(--dark); }
  .btn-export { background: var(--purple); color: #fff; }

  /* ── Main layout ── */
  main {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 0;
  }

  /* ── Blockly panel ── */
  #blockly-panel {
    flex: 1 1 55%;
    min-width: 320px;
    position: relative;
    border-right: 3px solid #eee;
  }

  #blocklyDiv {
    width: 100%;
    height: 100%;
  }

  /* ── Canvas panel ── */
  #canvas-panel {
    flex: 1 1 45%;
    min-width: 280px;
    display: flex;
    flex-direction: column;
    background: var(--panel);
  }

  #canvas-header {
    padding: 10px 16px;
    background: var(--dark);
    color: #fff;
    font-weight: 800;
    font-size: 0.85rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #canvas-wrap {
    flex: 1;
    position: relative;
    background:
      radial-gradient(circle at 20% 80%, #FFD93D22 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, #6BCB7722 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, #4D96FF11 0%, transparent 70%),
      #f7f3ff;
    overflow: hidden;
  }

  /* dot-grid */
  #canvas-wrap::before {
    content: '';
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, #c5b8e8 1px, transparent 1px);
    background-size: 24px 24px;
    opacity: 0.5;
    pointer-events: none;
  }

  #turtleCanvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }

  /* ── Status bar ── */
  #status-bar {
    padding: 6px 16px;
    background: #f0eeff;
    border-top: 2px solid #e0d8ff;
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: #666;
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
  }
  #status-bar span { color: var(--purple); font-weight: 700; }

  /* ── Turtle SVG ── */
  #turtle-el {
    position: absolute;
    width: 36px;
    height: 36px;
    transform-origin: 18px 18px;
    pointer-events: none;
    transition: left 0.05s linear, top 0.05s linear;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
  }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--dark);
    color: #fff;
    padding: 10px 22px;
    border-radius: 50px;
    font-weight: 700;
    font-size: 0.9rem;
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
    z-index: 999;
    pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ── Speed control ── */
  #speed-wrap {
    padding: 6px 14px;
    background: #fff;
    border-top: 2px solid #eee;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.8rem;
    font-weight: 700;
    color: #555;
  }
  #speedSlider {
    -webkit-appearance: none;
    flex: 1;
    height: 6px;
    border-radius: 3px;
    background: linear-gradient(to right, var(--sky), var(--purple));
    outline: none;
  }
  #speedSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--purple);
    cursor: pointer;
    border: 3px solid #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }

  /* ── Variable dialog ── */
  #var-dialog-backdrop {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 300;
    align-items: center;
    justify-content: center;
  }
  #var-dialog-backdrop.open { display: flex; }
  #var-dialog {
    background: #fff;
    border-radius: 18px;
    padding: 28px 28px 22px;
    width: min(360px, 90vw);
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    animation: modalIn 0.2s cubic-bezier(.34,1.56,.64,1);
  }
  #var-dialog h3 {
    font-size: 1.1rem;
    font-weight: 900;
    margin-bottom: 14px;
    color: var(--dark);
  }
  #var-name-input {
    width: 100%;
    padding: 10px 14px;
    border: 2.5px solid #ddd;
    border-radius: 10px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    outline: none;
    transition: border-color 0.15s;
  }
  #var-name-input:focus { border-color: var(--purple); }
  #var-name-input.error { border-color: var(--coral); }
  #var-error {
    color: var(--coral);
    font-size: 0.8rem;
    font-weight: 700;
    margin-top: 6px;
    min-height: 18px;
  }
  #var-dialog-btns {
    display: flex;
    gap: 10px;
    margin-top: 18px;
    justify-content: flex-end;
  }

  /* ── Delete drop zone ── */
  #delete-zone {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 48px;
    background: #c0392b;
    color: #fff;
    font-weight: 800;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    z-index: 20;
    border-top: 3px solid #e74c3c;
  }
  #delete-zone.visible {
    opacity: 1;
    pointer-events: all;
  }
  #delete-zone.hot {
    background: #e74c3c;
    font-size: 1rem;
  }

  /* Hide Blockly's own broken trashcan entirely */
  .blocklyTrash { display: none !important; }

  /* ── Custom Blockly controls (replaces broken spritesheet icons) ── */
  #blockly-controls {
    position: absolute;
    bottom: 16px;
    right: 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 10;
  }
  .bctrl {
    width: 36px; height: 36px;
    border: none;
    border-radius: 10px;
    background: var(--dark);
    color: #fff;
    font-size: 1.1rem;
    line-height: 1;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    transition: background 0.15s, transform 0.1s;
    display: flex; align-items: center; justify-content: center;
  }
  .bctrl:hover  { background: #444; transform: scale(1.1); }
  .bctrl-trash  { background: #c0392b; margin-top: 4px; }
  .bctrl-trash:hover { background: var(--coral); }

  /* ── Python export modal ── */
  #py-modal-backdrop {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  #py-modal-backdrop.open { display: flex; }

  #py-modal {
    background: #1e1e2e;
    border-radius: 20px;
    width: min(680px, 94vw);
    max-height: 88vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    overflow: hidden;
    animation: modalIn 0.25s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes modalIn {
    from { transform: scale(0.88) translateY(20px); opacity: 0; }
    to   { transform: scale(1)    translateY(0);    opacity: 1; }
  }

  #py-modal-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 16px 20px;
    background: #2a2a3e;
    border-bottom: 2px solid #383860;
  }
  #py-modal-header h2 {
    font-size: 1rem;
    font-weight: 800;
    color: #C77DFF;
    flex: 1;
  }
  #py-modal-header .badge {
    background: #C77DFF22;
    color: #C77DFF;
    border: 1.5px solid #C77DFF55;
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 0.72rem;
    font-weight: 700;
  }

  #py-code-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }

  #py-code {
    font-family: 'Space Mono', monospace;
    font-size: 0.82rem;
    line-height: 1.7;
    color: #cdd6f4;
    white-space: pre;
    tab-size: 4;
  }

  /* Syntax highlighting */
  .py-kw   { color: #cba6f7; }  /* keywords */
  .py-fn   { color: #89dceb; }  /* function calls */
  .py-num  { color: #fab387; }  /* numbers */
  .py-str  { color: #a6e3a1; }  /* strings */
  .py-cm   { color: #6c7086; font-style: italic; }  /* comments */
  .py-imp  { color: #f38ba8; }  /* import */

  #py-modal-footer {
    padding: 14px 20px;
    background: #2a2a3e;
    border-top: 2px solid #383860;
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .btn-copy { background: var(--sky);    color: #fff; }
  .btn-dl   { background: var(--mint);   color: #fff; }
  .btn-close-modal { background: #44445a; color: #ccc; }

  #copy-tick {
    display: none;
    color: var(--mint);
    font-weight: 800;
    align-items: center;
    gap: 4px;
    font-size: 0.85rem;
    margin-right: auto;
    align-self: center;
  }
  #copy-tick.show { display: flex; }
</style>
</head>
<body>

<header>
  <div class="logo">🐢 <span>Geo</span>Turtle</div>
  <div class="subtitle">Drag blocks → Draw shapes!</div>
  <div class="header-actions">
    <button class="btn btn-run"    onclick="runCode()">▶ Run</button>
    <button class="btn btn-export" onclick="showPythonExport()">🐍 Export Python</button>
    <button class="btn btn-clear"  onclick="clearCanvas()">🗑 Clear Drawing</button>
    <button class="btn btn-reset"  onclick="resetAll()">↺ Reset All</button>
  </div>
</header>

<main>
  <div id="blockly-panel">
    <div id="blocklyDiv"></div>
    <div id="blockly-controls">
      <button class="bctrl" title="Zoom in"       onclick="workspace.zoomCenter(1)">＋</button>
      <button class="bctrl" title="Zoom out"      onclick="workspace.zoomCenter(-1)">－</button>
      <button class="bctrl" title="Reset zoom"    onclick="workspace.setScale(1); workspace.scrollCenter()">⊙</button>
      <button class="bctrl bctrl-trash" title="Delete selected block (or press Delete key)" onclick="deleteSelected()">🗑</button>
    </div>
    <div id="delete-zone">🗑 Drop here to delete</div>
  </div>

  <div id="canvas-panel">
    <div id="canvas-header">🎨 Drawing Canvas</div>
    <div id="canvas-wrap">
      <canvas id="turtleCanvas"></canvas>
      <div id="turtle-el">
        <svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
          <!-- Shell -->
          <ellipse cx="18" cy="20" rx="11" ry="9" fill="#6BCB77" stroke="#2D7D46" stroke-width="1.5"/>
          <!-- Shell pattern -->
          <ellipse cx="18" cy="20" rx="6" ry="5" fill="#4CAF50" opacity="0.6"/>
          <line x1="18" y1="11" x2="18" y2="29" stroke="#2D7D46" stroke-width="0.8" opacity="0.5"/>
          <line x1="7" y1="20" x2="29" y2="20" stroke="#2D7D46" stroke-width="0.8" opacity="0.5"/>
          <!-- Head (points up = direction of travel) -->
          <ellipse cx="18" cy="8" rx="5" ry="5" fill="#8BC34A" stroke="#2D7D46" stroke-width="1.2"/>
          <!-- Eyes -->
          <circle cx="16" cy="7" r="1.2" fill="#fff"/>
          <circle cx="20" cy="7" r="1.2" fill="#fff"/>
          <circle cx="16.3" cy="6.8" r="0.6" fill="#333"/>
          <circle cx="20.3" cy="6.8" r="0.6" fill="#333"/>
          <!-- Legs -->
          <ellipse cx="8"  cy="15" rx="3.5" ry="2" fill="#8BC34A" stroke="#2D7D46" stroke-width="1" transform="rotate(-20,8,15)"/>
          <ellipse cx="28" cy="15" rx="3.5" ry="2" fill="#8BC34A" stroke="#2D7D46" stroke-width="1" transform="rotate(20,28,15)"/>
          <ellipse cx="8"  cy="25" rx="3.5" ry="2" fill="#8BC34A" stroke="#2D7D46" stroke-width="1" transform="rotate(20,8,25)"/>
          <ellipse cx="28" cy="25" rx="3.5" ry="2" fill="#8BC34A" stroke="#2D7D46" stroke-width="1" transform="rotate(-20,28,25)"/>
          <!-- Tail -->
          <ellipse cx="18" cy="30" rx="2.5" ry="3" fill="#8BC34A" stroke="#2D7D46" stroke-width="1"/>
          <!-- Direction arrow -->
          <polygon points="18,1 21,5 15,5" fill="#FFD93D" stroke="#F9A825" stroke-width="0.5"/>
        </svg>
      </div>
    </div>
    <div id="speed-wrap">
      🐢 Speed
      <input type="range" id="speedSlider" min="1" max="10" value="5">
      🚀
    </div>
    <div id="status-bar">
      x: <span id="st-x">0</span> &nbsp; y: <span id="st-y">0</span> &nbsp; angle: <span id="st-a">0</span>° &nbsp; pen: <span id="st-p">down</span> &nbsp; colour: <span id="st-c">■</span>
    </div>
  </div>
</main>

<div id="toast"></div>

<!-- Variable creation dialog -->
<div id="var-dialog-backdrop">
  <div id="var-dialog">
    <h3>📦 New Variable</h3>
    <input id="var-name-input" type="text" placeholder="e.g. side, angle, size" maxlength="40" autocomplete="off" spellcheck="false">
    <div id="var-error"></div>
    <div id="var-dialog-btns">
      <button class="btn btn-close-modal" onclick="closeVarDialog()">Cancel</button>
      <button class="btn" style="background:var(--purple);color:#fff" onclick="confirmVarCreate()">Create</button>
    </div>
  </div>
</div>

<!-- Python Export Modal -->
<div id="py-modal-backdrop" onclick="closePyModal(event)">
  <div id="py-modal">
    <div id="py-modal-header">
      <span style="font-size:1.4rem">🐍</span>
      <h2>Python Turtle Code</h2>
      <div class="badge">Ready to run in Python!</div>
    </div>
    <div id="py-code-wrap">
      <div id="py-code"></div>
    </div>
    <div id="py-modal-footer">
      <div id="copy-tick">✔ Copied!</div>
      <button class="btn btn-copy"         onclick="copyPython()">📋 Copy</button>
      <button class="btn btn-dl"           onclick="downloadPython()">⬇ Download .py</button>
      <button class="btn btn-close-modal"  onclick="closePyModalDirect()">✕ Close</button>
    </div>
  </div>
</div>

<!-- Toolbox XML -->
<xml id="toolbox" style="display:none">
  <category name="🐢 Move" colour="#4D96FF">
    <block type="turtle_move_forward">
      <value name="DISTANCE">
        <block type="math_number"><field name="NUM">100</field></block>
      </value>
    </block>
    <block type="turtle_turn">
      <field name="DIRECTION">left</field>
      <value name="ANGLE">
        <block type="math_number"><field name="NUM">90</field></block>
      </value>
    </block>
    <block type="turtle_turn">
      <field name="DIRECTION">right</field>
      <value name="ANGLE">
        <block type="math_number"><field name="NUM">90</field></block>
      </value>
    </block>
  </category>
  <category name="🖊 Pen" colour="#FF6B6B">
    <block type="turtle_pen_down"></block>
    <block type="turtle_pen_up"></block>
    <block type="turtle_set_colour">
      <value name="COLOUR">
        <block type="colour_picker"><field name="COLOUR">#FF6B6B</field></block>
      </value>
    </block>
  </category>
  <category name="🔁 Loops" colour="#6BCB77">
    <block type="controls_repeat_ext">
      <value name="TIMES">
        <block type="math_number"><field name="NUM">4</field></block>
      </value>
    </block>
    <block type="controls_whileUntil"></block>
  </category>
  <category name="🔢 Numbers" colour="#C77DFF">
    <block type="math_number"><field name="NUM">100</field></block>
    <block type="math_arithmetic"></block>
    <block type="math_single"></block>
  </category>
  <category name="📦 Variables" colour="#FF9F43" custom="VARIABLE"></category>
</xml>

<!-- Starter workspace XML -->
<xml id="startBlocks" style="display:none">
  <block type="turtle_set_colour" x="40" y="40">
    <value name="COLOUR">
      <block type="colour_picker"><field name="COLOUR">#4D96FF</field></block>
    </value>
    <next>
      <block type="controls_repeat_ext">
        <value name="TIMES">
          <block type="math_number"><field name="NUM">4</field></block>
        </value>
        <statement name="DO">
          <block type="turtle_move_forward">
            <value name="DISTANCE">
              <block type="math_number"><field name="NUM">100</field></block>
            </value>
            <next>
              <block type="turtle_turn">
                <field name="DIRECTION">right</field>
                <value name="ANGLE">
                  <block type="math_number"><field name="NUM">90</field></block>
                </value>
              </block>
            </next>
          </block>
        </statement>
      </block>
    </next>
  </block>
</xml>

<script>
// ════════════════════════════════════════════
//  1. CUSTOM BLOCK DEFINITIONS
// ════════════════════════════════════════════

Blockly.defineBlocksWithJsonArray([
  {
    type: "turtle_move_forward",
    message0: "move forward %1 steps",
    args0: [{ type: "input_value", name: "DISTANCE", check: "Number" }],
    previousStatement: null, nextStatement: null,
    colour: "#4D96FF",
    tooltip: "Move the turtle forward by a number of steps",
    helpUrl: ""
  },
  {
    type: "turtle_turn",
    message0: "turn %1 by %2 degrees",
    args0: [
      { type: "field_dropdown", name: "DIRECTION", options: [["left ↺","left"],["right ↻","right"]] },
      { type: "input_value", name: "ANGLE", check: "Number" }
    ],
    previousStatement: null, nextStatement: null,
    colour: "#4D96FF",
    tooltip: "Turn the turtle left or right",
    helpUrl: ""
  },
  {
    type: "turtle_pen_down",
    message0: "pen down ✏️",
    previousStatement: null, nextStatement: null,
    colour: "#FF6B6B",
    tooltip: "Put the pen down so the turtle draws as it moves"
  },
  {
    type: "turtle_pen_up",
    message0: "pen up ✋",
    previousStatement: null, nextStatement: null,
    colour: "#FF6B6B",
    tooltip: "Lift the pen so the turtle moves without drawing"
  },
  {
    type: "turtle_set_colour",
    message0: "set colour to %1",
    args0: [{ type: "input_value", name: "COLOUR", check: "Colour" }],
    previousStatement: null, nextStatement: null,
    colour: "#FF6B6B",
    tooltip: "Change the drawing colour"
  }
]);

// ════════════════════════════════════════════
//  2. CODE GENERATORS
// ════════════════════════════════════════════

Blockly.JavaScript.forBlock['turtle_move_forward'] = function(block, gen) {
  const dist = gen.valueToCode(block, 'DISTANCE', 0) || '100';
  return `turtleForward(${dist});\n`;
};
Blockly.JavaScript.forBlock['turtle_turn'] = function(block, gen) {
  const dir   = block.getFieldValue('DIRECTION');
  const angle = gen.valueToCode(block, 'ANGLE', 0) || '90';
  return `turtle${dir === 'left' ? 'Left' : 'Right'}(${angle});\n`;
};
Blockly.JavaScript.forBlock['turtle_pen_down'] = () => `turtlePenDown();\n`;
Blockly.JavaScript.forBlock['turtle_pen_up']   = () => `turtlePenUp();\n`;
Blockly.JavaScript.forBlock['turtle_set_colour'] = function(block, gen) {
  const colour = gen.valueToCode(block, 'COLOUR', 0) || '"#FF6B6B"';
  return `turtleColour(${colour});\n`;
};

// ════════════════════════════════════════════
//  2b. PYTHON GENERATORS
// ════════════════════════════════════════════

// We build a minimal Python generator by walking blocks manually.
// This produces clean, readable Python turtle code.

function hexToRgbFrac(hex) {
  hex = hex.replace('#','');
  if (hex.length === 3) hex = hex.split('').map(c=>c+c).join('');
  const n = parseInt(hex, 16);
  return [((n>>16)&255)/255, ((n>>8)&255)/255, (n&255)/255];
}

function blockToPython(block, indent) {
  if (!block) return '';
  const pad = '    '.repeat(indent);
  let out = '';

  switch (block.type) {
    case 'turtle_move_forward': {
      const dist = valueBlockToPython(block, 'DISTANCE');
      out += `${pad}t.forward(${dist})\n`;
      break;
    }
    case 'turtle_turn': {
      const dir   = block.getFieldValue('DIRECTION');
      const angle = valueBlockToPython(block, 'ANGLE');
      out += `${pad}t.${dir}(${angle})\n`;
      break;
    }
    case 'turtle_pen_down':
      out += `${pad}t.pendown()\n`; break;
    case 'turtle_pen_up':
      out += `${pad}t.penup()\n`; break;
    case 'turtle_set_colour': {
      const colBlock = block.getInputTargetBlock('COLOUR');
      const hex = colBlock ? colBlock.getFieldValue('COLOUR') : '#FF6B6B';
      const [r,g,b] = hexToRgbFrac(hex);
      out += `${pad}t.pencolor(${r.toFixed(3)}, ${g.toFixed(3)}, ${b.toFixed(3)})\n`;
      break;
    }
    case 'controls_repeat_ext': {
      const times = valueBlockToPython(block, 'TIMES');
      out += `${pad}for _ in range(${times}):\n`;
      const body = block.getInputTargetBlock('DO');
      const inner = blockSequenceToPython(body, indent + 1);
      out += inner || `${'    '.repeat(indent+1)}pass\n`;
      break;
    }
    case 'controls_whileUntil': {
      const mode = block.getFieldValue('MODE');
      const cond = valueBlockToPython(block, 'BOOL') || 'True';
      out += mode === 'WHILE'
        ? `${pad}while ${cond}:\n`
        : `${pad}while not (${cond}):\n`;
      const body = block.getInputTargetBlock('DO');
      const inner = blockSequenceToPython(body, indent + 1);
      out += inner || `${'    '.repeat(indent+1)}pass\n`;
      break;
    }
    case 'math_number':
      out += block.getFieldValue('NUM'); break;
    case 'math_arithmetic': {
      const opMap = {ADD:'+',MINUS:'-',MULTIPLY:'*',DIVIDE:'/',POWER:'**'};
      const op = opMap[block.getFieldValue('OP')] || '+';
      const a  = valueBlockToPython(block, 'A');
      const b2 = valueBlockToPython(block, 'B');
      out += `(${a} ${op} ${b2})`; break;
    }
    case 'math_single': {
      const opMap = {ROOT:'math.sqrt',ABS:'abs',NEG:'-',LN:'math.log',LOG10:'math.log10',EXP:'math.exp',POW10:'10**'};
      const op = block.getFieldValue('OP');
      const val = valueBlockToPython(block, 'NUM');
      out += op === 'NEG' ? `-(${val})` : `${opMap[op] || 'abs'}(${val})`; break;
    }
    case 'variables_get': {
      const name = block.getField('VAR').getText();
      out += name; break;
    }
    case 'variables_set': {
      const name = block.getField('VAR').getText();
      const val  = valueBlockToPython(block, 'VALUE');
      out += `${pad}${name} = ${val}\n`; break;
    }
    case 'math_change': {
      const name = block.getField('VAR').getText();
      const delta = valueBlockToPython(block, 'DELTA');
      out += `${pad}${name} += ${delta}\n`; break;
    }
    default:
      // fallback: try to get a field value
      out += block.getFieldValue('NUM') || block.getFieldValue('TEXT') || '0';
  }

  return out;
}

function valueBlockToPython(parentBlock, inputName) {
  const target = parentBlock.getInputTargetBlock(inputName);
  if (!target) return '0';
  return blockToPython(target, 0).trim();
}

function blockSequenceToPython(block, indent) {
  let out = '';
  let cur = block;
  while (cur) {
    out += blockToPython(cur, indent);
    cur = cur.getNextBlock();
  }
  return out;
}

function generatePythonCode() {
  const lines = [];
  lines.push('import turtle');
  lines.push('');
  lines.push('# Set up the screen');
  lines.push('screen = turtle.Screen()');
  lines.push('screen.title("GeoTurtle Drawing")');
  lines.push('screen.bgcolor("white")');
  lines.push('screen.colormode(1.0)');
  lines.push('');
  lines.push('# Create the turtle');
  lines.push('t = turtle.Turtle()');
  lines.push('t.shape("turtle")');
  lines.push('t.speed(6)');
  lines.push('t.pensize(2)');
  lines.push('t.pencolor(1.0, 0.42, 0.42)  # default red');

  // Emit variable initialisations (set to 0 by default, matching Blockly JS behaviour)
  const allVars = workspace.getAllVariables();
  if (allVars.length > 0) {
    lines.push('');
    lines.push('# Variables');
    for (const v of allVars) {
      lines.push(`${v.name} = 0`);
    }
  }

  lines.push('');
  lines.push('# ── Your drawing code ──');

  // Walk top-level blocks
  const topBlocks = workspace.getTopBlocks(true);
  for (const block of topBlocks) {
    const seq = blockSequenceToPython(block, 0);
    if (seq.trim()) lines.push(seq.trimEnd());
  }

  lines.push('');
  lines.push('# Keep the window open');
  lines.push('screen.mainloop()');
  return lines.join('\n');
}

// ════════════════════════════════════════════
//  2c. SYNTAX HIGHLIGHT PYTHON (for display)
// ════════════════════════════════════════════

function highlightPython(code) {
  // Tokenise BEFORE escaping so special chars like # aren't mangled first.
  // Strategy: split into segments, tag each, then HTML-escape only the text segments.

  const tokens = [];
  let rest = code;

  // Regex to pull off the next interesting token in priority order
  const tokenRe = /(#[^\n]*)|("""[\s\S]*?"""|'''[\s\S]*?'''|"(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g;

  let last = 0;
  let m;
  tokenRe.lastIndex = 0;
  while ((m = tokenRe.exec(code)) !== null) {
    if (m.index > last) tokens.push({ type: 'code', text: code.slice(last, m.index) });
    if (m[1]) tokens.push({ type: 'comment', text: m[1] });
    else      tokens.push({ type: 'string',  text: m[2] });
    last = m.index + m[0].length;
  }
  if (last < code.length) tokens.push({ type: 'code', text: code.slice(last) });

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function highlightCode(s) {
    s = esc(s);
    // keywords
    s = s.replace(/\b(import|for|while|in|range|not|True|False|None|pass|def|return|if|else|elif)\b/g,
                  '<span class="py-kw">$1</span>');
    // function calls
    s = s.replace(/\b([a-zA-Z_]\w*)(\s*\()/g, '<span class="py-fn">$1</span>$2');
    // numbers
    s = s.replace(/\b(\d+(?:\.\d+)?)\b/g, '<span class="py-num">$1</span>');
    return s;
  }

  return tokens.map(tok => {
    if (tok.type === 'comment') return `<span class="py-cm">${esc(tok.text)}</span>`;
    if (tok.type === 'string')  return `<span class="py-str">${esc(tok.text)}</span>`;
    return highlightCode(tok.text);
  }).join('');
}



const workspace = Blockly.inject('blocklyDiv', {
  toolbox: document.getElementById('toolbox'),
  scrollbars: true,
  trashcan: false,
  zoom: { controls: false, wheel: true, startScale: 1.0 },
  grid: { spacing: 24, length: 3, colour: '#eee', snap: true },
  theme: Blockly.Theme.defineTheme('geo', {
    base: Blockly.Themes.Classic,
    componentStyles: {
      workspaceBackgroundColour: '#fdfbff',
      toolboxBackgroundColour: '#2D2D2D',
      toolboxForegroundColour: '#ffffff',
      flyoutBackgroundColour: '#3a3a3a',
      flyoutForegroundColour: '#ffffff',
      scrollbarColour: '#C77DFF',
    }
  })
});

// Load starter blocks
Blockly.Xml.domToWorkspace(document.getElementById('startBlocks'), workspace);

// ════════════════════════════════════════════
//  4. TURTLE ENGINE
// ════════════════════════════════════════════

const canvas    = document.getElementById('turtleCanvas');
const ctx       = canvas.getContext('2d');
const turtleEl  = document.getElementById('turtle-el');
const canvasWrap = document.getElementById('canvas-wrap');

let turtle = {};
let animQueue = [];
let running   = false;

function resizeCanvas() {
  const r = canvasWrap.getBoundingClientRect();
  canvas.width  = r.width;
  canvas.height = r.height;
  resetTurtleState();
}
window.addEventListener('resize', resizeCanvas);

function resetTurtleState(draw = false) {
  const r = canvasWrap.getBoundingClientRect();
  turtle = {
    x:       r.width  / 2,
    y:       r.height / 2,
    angle:   -90,          // facing up
    pen:     true,
    colour:  '#FF6B6B',
    lineW:   2.5
  };
  updateTurtleEl();
  updateStatus();
}

function updateTurtleEl() {
  const r = canvasWrap.getBoundingClientRect();
  turtleEl.style.left = (turtle.x - 18) + 'px';
  turtleEl.style.top  = (turtle.y - 18) + 'px';
  // angle: 0 = up (our turtle SVG points up). CSS rotation
  turtleEl.style.transform = `rotate(${turtle.angle + 90}deg)`;
}

function updateStatus() {
  const r = canvasWrap.getBoundingClientRect();
  document.getElementById('st-x').textContent = Math.round(turtle.x - r.width/2);
  document.getElementById('st-y').textContent = Math.round(-(turtle.y - r.height/2));
  document.getElementById('st-a').textContent = (((-turtle.angle - 90) % 360 + 360) % 360);
  document.getElementById('st-p').textContent = turtle.pen ? 'down ✏️' : 'up ✋';
  const cs = document.getElementById('st-c');
  cs.textContent = '■';
  cs.style.color = turtle.colour;
}

// ── Turtle primitives — just record commands ──
// All primitives push a plain command object. The animator
// executes them one-by-one so angle/state is always current.

function turtleForward(dist) { animQueue.push({ cmd: 'forward', dist }); }
function turtleLeft(deg)     { animQueue.push({ cmd: 'left',    deg  }); }
function turtleRight(deg)    { animQueue.push({ cmd: 'right',   deg  }); }
function turtlePenDown()     { animQueue.push({ cmd: 'pendown'       }); }
function turtlePenUp()       { animQueue.push({ cmd: 'penup'         }); }
function turtleColour(c)     { animQueue.push({ cmd: 'colour', col: c}); }

// ── Animation player ──
// Each 'forward' command animates over multiple frames.
// Other commands are instant.

let animState = null;   // current in-progress forward animation

function getStepPx() {
  // pixels per frame: slider 1 = 2px, slider 10 = 30px
  const v = parseInt(document.getElementById('speedSlider').value);
  return 2 + (v - 1) * (28 / 9);
}

function playQueue() {
  if (!running) return;

  // If we're mid-way through a forward move, continue it
  if (animState) {
    const px = Math.min(getStepPx(), animState.remaining);
    const prevX = turtle.x, prevY = turtle.y;
    turtle.x += Math.cos(animState.angle * Math.PI / 180) * px;
    turtle.y += Math.sin(animState.angle * Math.PI / 180) * px;
    animState.remaining -= px;

    if (turtle.pen) {
      ctx.strokeStyle = turtle.colour;
      ctx.lineWidth   = turtle.lineW;
      ctx.lineCap     = 'round';
      ctx.beginPath();
      ctx.moveTo(prevX, prevY);
      ctx.lineTo(turtle.x, turtle.y);
      ctx.stroke();
    }

    updateTurtleEl();
    updateStatus();

    if (animState.remaining <= 0.5) animState = null;
    requestAnimationFrame(playQueue);
    return;
  }

  // Pull next command
  if (animQueue.length === 0) { running = false; return; }
  const cmd = animQueue.shift();

  switch (cmd.cmd) {
    case 'forward':
      // Start animated move
      animState = { angle: turtle.angle, remaining: Math.abs(cmd.dist) };
      if (cmd.dist < 0) animState.angle += 180;
      break;
    case 'left':
      turtle.angle -= cmd.deg;
      updateTurtleEl(); updateStatus();
      break;
    case 'right':
      turtle.angle += cmd.deg;
      updateTurtleEl(); updateStatus();
      break;
    case 'pendown':
      turtle.pen = true;  updateStatus(); break;
    case 'penup':
      turtle.pen = false; updateStatus(); break;
    case 'colour':
      turtle.colour = cmd.col; updateStatus(); break;
  }

  requestAnimationFrame(playQueue);
}

// ════════════════════════════════════════════
//  5. RUN / CLEAR / RESET
// ════════════════════════════════════════════

function runCode() {
  if (running) return;
  const code = Blockly.JavaScript.workspaceToCode(workspace);
  animQueue = [];
  animState = null;
  running   = true;

  // Expose turtle functions globally so Blockly-generated code
  // (which may also reference Math, variables, etc.) can find them.
  const injected = {
    turtleForward, turtleLeft, turtleRight,
    turtlePenDown, turtlePenUp, turtleColour
  };
  Object.assign(globalThis, injected);

  try {
    // eslint-disable-next-line no-eval
    eval(code);
  } catch(e) {
    console.error('GeoTurtle run error:', e, '\nGenerated code:\n', code);
    showToast('Check your blocks and try again.');
    running = false;
    // Clean up globals on error too
    for (const k of Object.keys(injected)) delete globalThis[k];
    return;
  }

  // Clean up globals
  for (const k of Object.keys(injected)) delete globalThis[k];
  playQueue();
}

function clearCanvas() {
  if (running) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  resetTurtleState();
  showToast('🧹 Canvas cleared!');
}

function resetAll() {
  if (running) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  workspace.clear();
  Blockly.Xml.domToWorkspace(document.getElementById('startBlocks'), workspace);
  resetTurtleState();
  showToast('↺ Everything reset!');
}

function deleteSelected() {
  const selected = Blockly.common.getSelected();
  if (selected) {
    selected.dispose(true);
    showToast('🗑 Block deleted');
  } else {
    showToast('Click a block first to select it');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ════════════════════════════════════════════
//  6. PYTHON EXPORT
// ════════════════════════════════════════════

let _lastPyCode = '';

function showPythonExport() {
  _lastPyCode = generatePythonCode();
  document.getElementById('py-code').innerHTML = highlightPython(_lastPyCode);
  document.getElementById('copy-tick').classList.remove('show');
  document.getElementById('py-modal-backdrop').classList.add('open');
}

function closePyModal(e) {
  if (e.target === document.getElementById('py-modal-backdrop')) closePyModalDirect();
}
function closePyModalDirect() {
  document.getElementById('py-modal-backdrop').classList.remove('open');
}

function copyPython() {
  // navigator.clipboard requires HTTPS — use a textarea fallback that works everywhere
  try {
    const ta = document.createElement('textarea');
    ta.value = _lastPyCode;
    ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const tick = document.getElementById('copy-tick');
    tick.classList.add('show');
    setTimeout(() => tick.classList.remove('show'), 2000);
  } catch(e) {
    showToast('Could not copy — try selecting the code manually');
  }
}

function downloadPython() {
  const blob = new Blob([_lastPyCode], { type: 'text/plain' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = 'geoturtle_drawing.py';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('🐍 Python file downloaded!');
}

// ════════════════════════════════════════════
//  7. VARIABLE DIALOG
// ════════════════════════════════════════════

// Override Blockly's built-in prompt so "Create variable..." works
// without needing the missing dialog module from cdnjs.
Blockly.dialog.setPrompt((message, defaultValue, callback) => {
  openVarDialog(callback);
});

function openVarDialog(callback) {
  const backdrop = document.getElementById('var-dialog-backdrop');
  const input    = document.getElementById('var-name-input');
  const errEl    = document.getElementById('var-error');
  input.value = '';
  input.classList.remove('error');
  errEl.textContent = '';
  backdrop.classList.add('open');
  setTimeout(() => input.focus(), 80);

  // Store callback so confirm button can call it
  backdrop._callback = callback;

  // Allow Enter key to confirm
  input.onkeydown = (e) => {
    if (e.key === 'Enter') confirmVarCreate();
    if (e.key === 'Escape') closeVarDialog();
  };
}

function confirmVarCreate() {
  const backdrop = document.getElementById('var-dialog-backdrop');
  const input    = document.getElementById('var-name-input');
  const errEl    = document.getElementById('var-error');
  const name     = input.value.trim();

  // Validate
  if (!name) {
    errEl.textContent = 'Please enter a variable name.';
    input.classList.add('error');
    input.focus();
    return;
  }
  if (!/^[a-zA-Z_][a-zA-Z0-9_]*$/.test(name)) {
    errEl.textContent = 'Use letters, numbers and underscores only (no spaces).';
    input.classList.add('error');
    input.focus();
    return;
  }
  // Check for duplicate
  const existing = workspace.getAllVariables().map(v => v.name.toLowerCase());
  if (existing.includes(name.toLowerCase())) {
    errEl.textContent = `"${name}" already exists.`;
    input.classList.add('error');
    input.focus();
    return;
  }

  // Grab callback BEFORE closing (closeVarDialog nulls it)
  const cb = backdrop._callback;
  backdrop._callback = null;
  backdrop.classList.remove('open');
  if (cb) cb(name);
}

function closeVarDialog() {
  const backdrop = document.getElementById('var-dialog-backdrop');
  const cb = backdrop._callback;
  backdrop._callback = null;
  backdrop.classList.remove('open');
  if (cb) cb(null); // null = cancelled
}

// ════════════════════════════════════════════
//  8. INIT
// ════════════════════════════════════════════

setTimeout(() => {
  resizeCanvas();

  // ── Delete zone: show when dragging a block, delete if dropped on zone ──
  const deleteZone = document.getElementById('delete-zone');
  let draggedBlock = null;

  workspace.addChangeListener((e) => {
    if (e.type === Blockly.Events.BLOCK_DRAG) {
      if (e.isStart) {
        // Block drag started — show the zone
        draggedBlock = workspace.getBlockById(e.blockId);
        deleteZone.classList.add('visible');
        deleteZone.classList.remove('hot');
      } else {
        // Drag ended — check if block was dropped on zone
        deleteZone.classList.remove('visible');
        deleteZone.classList.remove('hot');

        if (draggedBlock) {
          const zoneRect = deleteZone.getBoundingClientRect();
          // Use the block's SVG position to detect overlap
          const blockSvg = draggedBlock.getSvgRoot();
          if (blockSvg) {
            const blockRect = blockSvg.getBoundingClientRect();
            const overlap =
              blockRect.left  < zoneRect.right  &&
              blockRect.right > zoneRect.left   &&
              blockRect.top   < zoneRect.bottom &&
              blockRect.bottom > zoneRect.top;
            if (overlap) {
              draggedBlock.dispose(true);
              showToast('🗑 Block deleted');
            }
          }
          draggedBlock = null;
        }
      }
    }
  });

  // Highlight zone hot when block hovers over it during drag
  deleteZone.addEventListener('mouseover', () => {
    if (deleteZone.classList.contains('visible')) {
      deleteZone.classList.add('hot');
    }
  });
  deleteZone.addEventListener('mouseout', () => {
    deleteZone.classList.remove('hot');
  });

}, 100);
